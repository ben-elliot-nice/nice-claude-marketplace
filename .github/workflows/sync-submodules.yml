name: Sync submodule

on:
  repository_dispatch:
    types: [submodule-updated]
  workflow_dispatch:
    inputs:
      submodule_path:
        description: 'Submodule path to update (e.g. plugins/cognigy)'
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
          token: ${{ secrets.MARKETPLACE_PAT }}

      - name: Resolve submodule path
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "path=${{ github.event.client_payload.submodule_path }}" >> "$GITHUB_OUTPUT"
            echo "plugin=${{ github.event.client_payload.plugin }}" >> "$GITHUB_OUTPUT"
          else
            echo "path=${{ inputs.submodule_path }}" >> "$GITHUB_OUTPUT"
            echo "plugin=$(basename ${{ inputs.submodule_path }})" >> "$GITHUB_OUTPUT"
          fi

      - name: Update submodule to latest main
        run: git submodule update --remote "${{ steps.resolve.outputs.path }}"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.resolve.outputs.path }}"
          if git diff --cached --quiet; then
            echo "No submodule change to commit."
          else
            VERSION=$(jq -r '.version' "${{ steps.resolve.outputs.path }}/.claude-plugin/plugin.json")
            git commit -m "chore: update ${{ steps.resolve.outputs.plugin }} plugin to v${VERSION}"
            git push
          fi
